name: Build and Push to Artifact Registry

on:
  push:
    branches: [ "main" ]

env:
  # Values matched to your main.tf variables
  PROJECT_ID: "tech-test-fif" 
  GAR_LOCATION: "us-central1"
  REPOSITORY: "ventas-repo"
  IMAGE: "ventas-subscriber"

jobs:
  build-push:
    runs-on: ubuntu-latest
    permissions:
      contents: 'read'
      id-token: 'write' # Required for WIF handshake

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    # 1. Authenticate to Google Cloud via WIF
    - name: Google Auth
      id: auth
      uses: 'google-github-actions/auth@v2'
      with:
        token_format: 'access_token'
        # Replace PROJECT_NUMBER with your 12-digit GCP Project Number
        workload_identity_provider: 'projects/PROJECT_NUMBER/locations/global/workloadIdentityPools/terraform-pool/providers/github-provider'
        service_account: 'sa-github-actions-gar@tech-test-fif.iam.gserviceaccount.com'

    # 2. Log in to Docker using the WIF Access Token
    - name: Docker Auth
      uses: 'docker/login-action@v3'
      with:
        username: 'oauth2accesstoken'
        password: '${{ steps.auth.outputs.access_token }}'
        registry: 'us-central1-docker.pkg.dev'

    # 3. Build and Push using the specific path from your main.tf
    - name: Build and Push Container
      run: |-
        TAG="${{ github.sha }}"
        REPO_PATH="${{ env.GAR_LOCATION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.REPOSITORY }}/${{ env.IMAGE }}"
        
        docker build -t "$REPO_PATH:$TAG" -t "$REPO_PATH:latest" .
        docker push "$REPO_PATH:$TAG"
        docker push "$REPO_PATH:latest"